<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Messages</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="chat.js"></script>

</head>


<body>


<div class="app-shell">


<header class="app-header">

<div class="logo">
Messages
</div>


<a href="home.html" class="icon-btn">
←
</a>


</header>




<div class="chat-container">


<h3>
Chat with user
</h3>


<input 
id="receiver"
placeholder="Enter username"
style="
width:100%;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
margin:10px 0;
"
>




<div id="messages">

</div>




</div>





<div class="chat-input">


<input 
id="messageText"
placeholder="Type message..."
>


<button id="sendBtn">
Send
</button>


</div>



</div>


</body>

</html>
