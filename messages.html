<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RHK Messages</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script type="module" src="messages.js"></script>

</head>

<body>

<div class="app">

<header class="topbar">

<a href="home.html">

<i class="fa-solid fa-arrow-left icon"></i>

</a>

<div class="logo">

Messages

</div>

<i class="fa-regular fa-pen-to-square icon"></i>

</header>

<!-- Search -->

<div style="padding:15px;">

<input
type="text"
id="searchChat"
placeholder="Search users...">

</div>

<!-- Users -->

<div id="chatUsers">

</div>

<!-- Chat Window -->

<div id="chatWindow" style="display:none;">

<div id="chatHeader"
style="
display:flex;
align-items:center;
padding:15px;
border-top:1px solid #222;
border-bottom:1px solid #222;
">

<img
id="chatDP"
style="
width:45px;
height:45px;
border-radius:50%;
margin-right:10px;
">

<h3 id="chatName"></h3>

</div>

<div
id="messages"
style="
height:55vh;
overflow-y:auto;
padding:15px;
">

</div>

<div
style="
display:flex;
padding:15px;
gap:10px;
">

<input
id="messageInput"
placeholder="Message...">

<button
id="sendBtn"
style="width:80px;">

Send

</button>

</div>

</div>

<nav class="bottom">

<a href="home.html">
<i class="fa-solid fa-house"></i>
</a>

<a href="search.html">
<i class="fa-solid fa-magnifying-glass"></i>
</a>

<a href="upload.html">
<i class="fa-regular fa-square-plus"></i>
</a>

<a href="reels.html">
<i class="fa-solid fa-clapperboard"></i>
</a>

<a href="profile.html">
<i class="fa-regular fa-circle-user"></i>
</a>

</nav>

</div>

</body>

</html>
