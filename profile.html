<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RHK Profile</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script type="module" src="profile.js"></script>

</head>

<body>

<div class="app">

<!-- Header -->

<header class="topbar">

<i class="fa-solid fa-lock"></i>

<div class="logo" id="profileUsername">
RHK
</div>

<div>

<i class="fa-solid fa-bars icon"></i>

</div>

</header>

<!-- Profile -->

<section class="profile-head">

<img
id="profileDP"
class="profile-dp"
src="https://i.pravatar.cc/150"
alt="Profile">

<div class="profile-info">

<h2 id="username">
Username
</h2>

<div class="stats">

<div>

<b id="postCount">0</b>

<p>Posts</p>

</div>

<div>

<b id="followersCount">0</b>

<p>Followers</p>

</div>

<div>

<b id="followingCount">0</b>

<p>Following</p>

</div>

</div>

</div>

</section>

<!-- Bio -->

<div style="padding:0 15px 10px;">

<p id="profileBio">

Welcome to RHK

</p>

</div>

<!-- Edit -->

<div style="padding:0 15px;">

<button id="editBtn">

Edit Profile

</button>

</div>

<!-- Edit Section -->

<div id="editSection" style="display:none;padding:15px;">

<input
type="file"
id="dpUpload"
accept="image/*">

<br><br>

<textarea
id="bioInput"
placeholder="Write your bio"></textarea>

<br><br>

<button id="saveProfile">

Save Profile

</button>

</div>

<!-- Story Highlights -->

<div class="stories">

<div class="story">

<img src="https://i.pravatar.cc/150?img=1">

<p>Travel</p>

</div>

<div class="story">

<img src="https://i.pravatar.cc/150?img=2">

<p>Food</p>

</div>

<div class="story">

<img src="https://i.pravatar.cc/150?img=3">

<p>Work</p>

</div>

</div>

<!-- Tabs -->

<div style="display:flex;justify-content:space-around;border-top:1px solid #262626;border-bottom:1px solid #262626;padding:10px;">

<i class="fa-solid fa-table-cells-large"></i>

<i class="fa-solid fa-film"></i>

<i class="fa-regular fa-bookmark"></i>

<i class="fa-solid fa-user-tag"></i>

</div>

<!-- Posts -->
