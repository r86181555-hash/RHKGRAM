<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK Login</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="app.js"></script>
</head>

<body>

<div class="container">

<div class="login-box">

<h1 class="logo">RHK</h1>

<p class="subtitle">Welcome Back</p>

<input
type="text"
id="loginUsername"
placeholder="Username"
>

<input
type="password"
id="loginPassword"
placeholder="Password"
>

<button id="loginBtn">
Log In
</button>

<p id="loginMessage"></p>

<div class="divider">
OR
</div>

<a href="signup.html" class="signupLink">
Create New Account
</a>

</div>

</div>

</body>
</html>
