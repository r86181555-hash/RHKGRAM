<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK - Gateway Registration</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="logo">RHK</h1>
            <p class="subtitle">Register an identification identity record.</p>
            <div class="auth-form">
                <input type="text" id="signupUsername" placeholder="Choose Username" autocomplete="username">
                <input type="password" id="signupPassword" placeholder="Choose Password">
                <button id="signupBtn">Create Account</button>
            </div>
            <p id="signupMessage" class="auth-message"></p>
            <div class="divider">OR</div>
            <a href="index.html" class="signupLink">Already have an account? Log In</a>
        </div>
    </div>
</body>
</html>
