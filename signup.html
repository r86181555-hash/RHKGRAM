<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - RHK</title>

    <link rel="stylesheet" href="style.css">

    <script type="module" src="app.js"></script>
</head>
<body>

<div class="container">

    <div class="login-box">

        <h1 class="logo">RHK</h1>

        <p class="subtitle">Create Your Account</p>

        <input
            type="text"
            id="signupUsername"
            placeholder="Choose Username"
        >

        <input
            type="password"
            id="signupPassword"
            placeholder="Choose Password"
        >

        <button id="signupBtn">
            Create Account
        </button>

        <p id="signupMessage"></p>

        <div class="divider">
            OR
        </div>

        <a href="index.html" class="signupLink">
            Already have an account? Log In
        </a>

    </div>

</div>

</body>
</html>
