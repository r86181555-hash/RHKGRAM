<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHK</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="feed.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding-bottom:70px;
}

header{
position:sticky;
top:0;
background:#000;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #222;
z-index:100;
}

.logo{
font-size:30px;
font-weight:bold;
}

.header-icons{
display:flex;
gap:20px;
font-size:26px;
}

.stories{
display:flex;
overflow-x:auto;
padding:15px;
gap:15px;
border-bottom:1px solid #222;
}

.stories::-webkit-scrollbar{
display:none;
}

.story{
min-width:80px;
text-align:center;
}

.story img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid #ff3b5c;
object-fit:cover;
}

.story p{
margin-top:5px;
font-size:12px;
}

#feed{
padding-bottom:80px;
}

.post{
margin-top:20px;
border-bottom:1px solid #222;
}

.post-header{
display:flex;
align-items:center;
padding:10px;
}

.post-header img{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
}

.username{
font-weight:bold;
}

.post-image{
width:100%;
display:block;
background:#111;
}

.post-actions{
display:flex;
justify-content:space-between;
padding:12px;
font-size:26px;
}

.left-actions{
display:flex;
gap:18px;
}

.post-caption{
padding:0 12px 18px;
font-size:15px;
line-height:22px;
}

.bottom-nav{
position:fixed;
left:0;
bottom:0;
width:100%;
height:60px;
background:#111;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #333;
font-size:26px;
}

.bottom-nav a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<div class="logo">
RHK
</div>

<div class="header-icons">
<span>➕</span>
<span>💬</span>
</div>

</header>

<div class="stories">

<div class="story">
<img src="https://i.pravatar.cc/150?img=1">
<p>You</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=2">
<p>Alex</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=3">
<p>Rahul</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=4">
<p>John</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=5">
<p>Riya</p>
</div>

</div>

<div id="feed">
<div class="post">

<div class="post-header">

<img src="https://i.pravatar.cc/150?img=10">

<div class="username">
Welcome to RHK
</div>

</div>

<img class="post-image"
src="https://picsum.photos/600/600?random=1">

<div class="post-actions">

<div class="left-actions">
<span>❤️</span>
<span>💬</span>
<span>📤</span>
</div>

<div>
🔖
</div>

</div>

<div class="post-caption">

<b>RHK</b>

<br><br>

Your uploaded posts from Firebase will appear here automatically.

</div>

</div>

</div>

<nav class="bottom-nav">

<a href="home.html">
🏠
</a>

<a href="#">

</a>

<a href="upload.html">
➕
</a>

<a href="#">

</a>

<a href="#">

</a>

</nav>

</body>

</html>
