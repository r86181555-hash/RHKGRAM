<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="feed.js"></script>
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="logo">RHK</div>
            <div class="header-actions">
                <button class="icon-btn" id="headerLogoutBtn" title="Logout">🚪</button>
            </div>
        </header>

        <!-- Stories Module -->
        <div class="stories-container">
            <div class="story-wrapper">
                <div class="story-avatar-ring"><img src="https://i.pravatar.cc/150?img=11" alt="User"></div>
                <div class="story-username">My Story</div>
            </div>
            <div class="story-wrapper">
                <div class="story-avatar-ring"><img src="https://i.pravatar.cc/150?img=22" alt="Alex"></div>
                <div class="story-username">alex_k</div>
            </div>
            <div class="story-wrapper">
                <div class="story-avatar-ring"><img src="https://i.pravatar.cc/150?img=33" alt="Sarah"></div>
                <div class="story-username">sarah.dev</div>
            </div>
            <div class="story-wrapper">
                <div class="story-avatar-ring"><img src="https://i.pravatar.cc/150?img=44" alt="James"></div>
                <div class="story-username">james_prime</div>
            </div>
            <div class="story-wrapper">
                <div class="story-avatar-ring"><img src="https://i.pravatar.cc/150?img=55" alt="Elena"></div>
                <div class="story-username">elena_r</div>
            </div>
        </div>

        <!-- Scrollable Feed Target Container -->
        <main id="feed" class="feed-stream">
            <!-- Dynamic context loads here -->
        </main>

        <!-- Bottom Application Navigation Component -->
        <nav class="navigation-bar">
            <a href="home.html" class="nav-item">🏠</a>
            <a href="#" class="nav-item">🔍</a>
            <a href="upload.html" class="nav-item">➕</a>
            <a href="#" class="nav-item">❤️</a>
            <a href="#" class="nav-item">👤</a>
        </nav>
    </div>

</body>
</html>
