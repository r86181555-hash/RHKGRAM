<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RHK</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="feed.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="logo">RHK</div>
            <div class="header-actions">
                <a href="messages.html" class="icon-link" title="Direct Messaging Channel">💬</a>
                <button class="icon-link" id="headerLogoutBtn" title="Terminate Session Stack">🚪</button>
            </div>
        </header>

        <!-- Dynamic Stories Module -->
        <div class="stories-strip" id="storiesStrip">
            <div class="story-node empty-story" id="currentUserStoryNode">
                <div class="story-ring">
                    <img id="currentUserStoryAvatar" src="https://i.pravatar.cc/150?img=placeholder" alt="User">
                </div>
                <div class="story-add-badge">+</div>
                <div class="story-label">Your Story</div>
                <input type="file" id="storyFileInput" accept="image/*" style="display:none;">
            </div>
            <div id="dynamicStoriesContainer" style="display: flex; gap: 14px;"></div>
        </div>

        <main id="feed" class="feed-stream"></main>

        <nav class="navigation-bar">
            <a href="home.html" class="nav-item">🏠</a>
            <a href="messages.html" class="nav-item">🔍</a>
            <a href="upload.html" class="nav-item">➕</a>
            <a href="messages.html" class="nav-item">💬</a>
            <a href="profile.html" class="nav-item">👤</a>
        </nav>
    </div>

    <!-- Screen Layer Overlay for Displaying Running Stories -->
    <div class="story-modal" id="storyModal">
        <div class="story-modal-progress"><div class="story-modal-bar" id="storyModalBar"></div></div>
        <div class="story-modal-header">
            <img class="story-modal-avatar" id="storyModalAvatar" src="" alt="">
            <span class="story-modal-user" id="storyModalUser">username</span>
        </div>
        <button class="story-modal-close" id="storyModalClose">✕</button>
        <div class="story-modal-content">
            <img class="story-modal-img" id="storyModalImage" src="" alt="Story content presentation element">
        </div>
    </div>
</body>
</html>
